<!DOCTYPE html>
<html>
<head>
<title>Mafia Panel Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  color:white;
  text-align:center;
  background: url('anime-bg.jpg') no-repeat center/cover;
}

/* LOADER */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:22px;
  color:red;
  animation: glow 1s infinite alternate;
}
@keyframes glow {
  from {opacity:0.4;}
  to {opacity:1;}
}

/* HEADER */
.hero {
  height:250px;
  background:url('anime-header.jpg') center/cover;
  display:flex;
  justify-content:center;
  align-items:center;
}
.overlay {
  background:rgba(0,0,0,0.6);
  padding:20px 40px;
  font-size:30px;
  border-radius:12px;
  box-shadow:0 0 20px red;
  animation: neon 1.5s infinite alternate;
}
@keyframes neon {
  from {text-shadow:0 0 10px red;}
  to {text-shadow:0 0 25px red;}
}

/* CARD */
.card {
  margin:20px;
  padding:15px;
  background:rgba(0,0,0,0.6);
  border-radius:12px;
  backdrop-filter:blur(10px);
  transition:0.3s;
}
.card:hover {
  transform:scale(1.05);
  box-shadow:0 0 20px red;
}

/* BUTTON */
button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg, red, darkred);
  color:white;
  font-weight:bold;
}
button:hover {
  background:black;
  box-shadow:0 0 10px red;
}

/* FLOAT BUTTONS */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:12px;
  border-radius:50%;
  font-size:20px;
}
.telegram {
  position:fixed;
  bottom:80px;
  right:20px;
  background:#0088cc;
  padding:12px;
  border-radius:50%;
  font-size:20px;
}

/* SOUND BUTTON */
.sound-btn {
  position:fixed;
  top:20px;
  right:20px;
  background:red;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">🔥 Loading Mafia Store...</div>

<!-- HEADER -->
<div class="hero">
  <div class="overlay">🔥 MAFIA PANEL STORE 🔥</div>
</div>

<!-- PANEL -->
<div class="card">
<h2>☠️ DRIPCILENT</h2>
<iframe width="100%" height="200" src="https://www.youtube.com/embed/KI93ov8Fjvw"></iframe>
<p>1 Day – ₹110<br>7 Days – ₹350<br>30 Days – ₹899</p>
<button onclick="buy('DRIPCILENT')">BUY NOW</button>
</div>

<!-- FLOAT BUTTONS -->
<a href="https://wa.me/919514782168" class="whatsapp">💬</a>
<a href="https://t.me/+yMIQgwLm7l02NmZl" class="telegram">📢</a>

<!-- SOUND -->
<button class="sound-btn" onclick="playSound()">🔊</button>

<audio id="bgSound" src="https://www.soundjay.com/buttons/button-3.mp3"></audio>

<script>
function buy(panel){
  window.open("https://wa.me/917339488009?text=I%20Paid%20for%20"+panel);
}

function playSound(){
  document.getElementById("bgSound").play();
}

window.onload = function(){
  document.getElementById("loader").style.display="none";
}
</script>

</body>
</html>
